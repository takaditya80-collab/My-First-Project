<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100%;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe5e5;
            overflow: hidden;
            position: relative;
        }

        .container {
            display: flex;
            flex-direction: column;
            text-align: center;
            align-items: center;
            gap: 15px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            z-index: 1;
        }

        .gif-container img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.6rem;
            color: #444;
            margin: 10px 0;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
            width: 100%;
        }

        .btn {
            text-decoration: none;
            color: #111;
            background: #fff;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            border: none;
            min-width: 100px;
            transition: transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.9);
        }

        #no-btn {
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <div class="gif-container">
            <img id="display-gif" src="https://media.tenor.com/9iS7Yd_696UAAAAM/manja.gif" alt="Cute GIF">
        </div>

        <h1 id="main-text">Have you forgiven me? 🤗</h1>

        <div class="btn-group">
            <button class="btn" id="yes-btn" onclick="sayYes()">Yes</button>
            <button class="btn" id="no-btn" onclick="handleNo()">No</button>
        </div>
    </div>

    <script>
        let noCount = 0;
        const noBtn = document.getElementById('no-btn');
        const mainText = document.getElementById('main-text');
        const displayGif = document.getElementById('display-gif');

        const content = [
            { gif: "https://media.tenor.com/9iS7Yd_696UAAAAM/manja.gif", text: "Have you forgiven me? 🤗" },
            { gif: "https://media.tenor.com/vHqB37_669UAAAAM/mochi-mochi-peach-cat-cat.gif", text: "Please think again! 🙄" },
            { gif: "https://media.tenor.com/866uXn_p6v8AAAAM/couple-forgive-me.gif", text: "Ek aur baar Soch lo! 😣" },
            { gif: "https://media.tenor.com/3_f07T1KAnQAAAAM/peach-goma.gif", text: "Please maan jao na! 😭" }
        ];

        function handleNo() {
            noCount++;

            // Cycle through the messages first
            if (noCount <= 3) {
                displayGif.src = content[noCount].gif;
                mainText.innerText = content[noCount].text;
            } 
            // Immediately start teleporting after the last message
            else {
                moveButton();
            }
        }

        function moveButton() {
            noBtn.style.position = "fixed";
            
            // Screen boundaries with safety padding
            const padding = 25;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
        }

        // Move on hover/touch after the sequence is done
        noBtn.addEventListener("mouseover", () => {
            if (noCount >= 4) moveButton();
        });
        
        noBtn.addEventListener("touchstart", (e) => {
            if (noCount >= 4) {
                e.preventDefault(); 
                moveButton();
            }
        });

        function sayYes() {
            document.getElementById('main-content').innerHTML = `
                <div class="gif-container">
                    <img src="https://media.tenor.com/X9S79Xp7_vEAAAAM/mochi-cat.gif" alt="Happy GIF">
                </div>
                <h1>Hehehehe, I knew it! thanks a lot 🤗</h1>
            `;
        }
    </script>
</body>
</html>
